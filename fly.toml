# fly.toml app configuration file generated for vidoctor on 2026-05-18T11:09:43+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vidoctor'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 20
    soft_limit = 10

  [[http_service.checks]]
    interval = '30s'
    timeout = '2s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'performance-2x'
